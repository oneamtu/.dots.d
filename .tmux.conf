unbind C-b
set -g prefix C-a
# C-a a will forward prefix
bind-key a send-prefix

set -g history-limit 100000

# Truecolor (24-bit) support
# default-terminal advertises 256 colors; terminal-features adds RGB so vim/nvim
# render full truecolor solarized. COLORTERM is set because tmux strips it, and
# the .vimrc truecolor guard keys off $COLORTERM.
set -g default-terminal "tmux-256color"
set -ag terminal-features ",*:RGB"
set-environment -g COLORTERM "truecolor"

# Start numbering at 1
set -g base-index 1
set-window-option -g pane-base-index 1

# Allows for faster key repetition
set -s escape-time 0

# Highlight active window (solarized yellow)
set-window-option -g window-status-current-style bg=yellow,fg=black

# Status bar styling
set -g status-style bg=green,fg=black
set -g status-left-style fg=black
set -g status-right-style fg=black
set -g window-status-separator ""
set -g clock-mode-colour white

# vim-like bindings
unbind-key %
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Smart pane switching with vim integration (handled by vim-tmux-navigator plugin)
# Install in vim: Plug 'christoomey/vim-tmux-navigator'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by, only
# one at a time can be slow
bind < resize-pane -L 5
bind > resize-pane -R 5
bind - resize-pane -D 5
bind + resize-pane -U 5

# Mouse mode on
set -g mouse on

set-option -g default-shell /usr/bin/zsh

# vi-style controls for copy mode
setw -g mode-keys vi

# List of plugins
# Supports `github_username/repo` or full git URLs
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-yank'

# Fuzzy find in history (choose one: extrakto is more feature-rich)
set -g @plugin 'laktak/extrakto'

# Window naming - show current directory (project name)
set -g set-titles on
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g @plugin 'MikeDacre/tmux-zsh-vim-titles'

set -g @almost-sensible 'on'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initializes TMUX plugin manager.
# Keep this line at the very bottom of tmux.conf.
run -b '~/.tmux/plugins/tpm/tpm'

# Override plugin color settings (must come after plugin initialization)
set -g status-left ""
set -g status-right "#[fg=black,bg=green] %H:%M %d-%b-%y "
set -g window-status-format " #I #W "
set -g window-status-current-format "#[fg=black,bg=red] #I #W "
set -g window-status-separator " "
